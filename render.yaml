# Render Blueprint — backend web service (free tier).
# Free tier spins down after ~15 min idle; first request cold-starts ~50s.
services:
  - type: web
    name: klypup-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: CORS_ORIGINS
        sync: false   # set to your Vercel URL, e.g. https://klypup.vercel.app
