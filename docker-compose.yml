# One-command local setup. DB is hosted Supabase (set creds in backend/.env),
# so compose only runs the two app services.
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    volumes: ["./backend:/app"]

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    env_file: ./frontend/.env
    volumes: ["./frontend:/app", "/app/node_modules"]
    depends_on: [backend]
