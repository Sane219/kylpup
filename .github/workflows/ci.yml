name: CI
on:
  push:
    branches: [main]
  pull_request:

# A new push to a PR cancels the previous in-flight run for that PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint, tenant guard, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt ruff pytest

      - name: Lint (ruff)
        run: ruff check app scripts tests

      # Isolation invariant gets its own step so a leak is unmissable in the run log.
      - name: Tenant-isolation guard
        run: python -m pytest tests/test_tenant_scoping.py -q

      - name: Tests
        run: python -m pytest -q

  frontend:
    name: Frontend — typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks scans full history, not just the tip
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
